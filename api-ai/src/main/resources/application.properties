spring.application.name=spring-ai-api

logging.level.org.springframework.ai=debug

management.endpoints.web.exposure.include=health,metrics

spring.ai.openai.api-key=${OPENAI_API_KEY}
# gpt-4o-mini supports vision (multimodal image input), used by the book cover identifier
spring.ai.openai.chat.model=gpt-4o-mini

# =============================================
# H2 Database Configuration
# =============================================
# File-based H2 database so data survives restarts without needing Docker/Postgres
spring.datasource.url=jdbc:h2:file:./data/mydatabase;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
# H2 web console, available at /h2-console when running locally
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================
# Vector Store Configuration (SimpleVectorStore)
# =============================================
# File-backed in-memory vector store - no external vector DB/extension required.
# Embeddings persist to app.vectorstore.file between restarts.
app.vectorstore.file=./data/vectorstore.json

# =============================================
# OpenAI Embeddings Configuration
# =============================================
# Use text-embedding-3-small model (cost-effective, good performance)
spring.ai.openai.embedding.model=text-embedding-3-small
# Embedding dimensions must match vector store configuration
spring.ai.openai.embedding.dimensions=1536

# =============================================
# File Upload Configuration
# =============================================
# Maximum file size for upload (10MB)
spring.servlet.multipart.max-file-size=10MB
# Maximum request size (10MB)
spring.servlet.multipart.max-request-size=10MB
# Enable multipart file uploads
spring.servlet.multipart.enabled=true
# Temporary directory for file uploads
spring.servlet.multipart.location=${java.io.tmpdir}

# =============================================
# RAG Document Storage Configuration
# =============================================
# Directory to store uploaded documents
app.documents.upload-dir=./documents
# Maximum chunk size for text splitting (in tokens)
app.documents.chunk-size=800
# Minimum chunk size (in characters)
app.documents.min-chunk-size=350
# Chunk overlap for continuity (in tokens)
app.documents.chunk-overlap=50
# Number of similar chunks to retrieve for RAG queries
app.documents.top-k=5

#spring.ai.chat.memory.repository.jdbc.initialize-schema=always
#spring.ai.chat.memory.repository.jdbc.schema=classpath:/custom/path/schema-mysql.sql

# Initialize schema using schema.sql and rag-schema.sql (documents table for RAG)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql,classpath:rag-schema.sql
# Seed sample flight reservations (data.sql) so the SpringFly bookings list isn't empty on first run
spring.sql.init.data-locations=classpath:data.sql

# =============================================
# MCP Server Configuration
# =============================================
# Exposes the flight reservation tools over MCP (Streamable HTTP/SSE), reachable at /mcp
spring.ai.mcp.server.name=springfly-mcp-server
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.protocol=STREAMABLE